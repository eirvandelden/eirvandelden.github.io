<script type="module">
  import { Application, Controller } from "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3/dist/stimulus.js";
  import { filterLibrarySections } from "{{ '/js/library_filter.js' | relative_url }}";

  const app = Application.start();

  app.register("library", class extends Controller {
    static targets = ["section", "filterBtn"];

    filter(event) {
      const selected = event.currentTarget.dataset.filter;
      filterLibrarySections({
        selected,
        buttons: this.filterBtnTargets,
        sections: this.sectionTargets
      });
    }
  });
</script>
